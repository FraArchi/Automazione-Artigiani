name: Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax smoke check
        run: |
          python -m py_compile \
            main.py \
            hermes_reviewer.py \
            scripts/artigiani_status.py \
            app/models.py \
            app/routes.py \
            app/runtime.py \
            app/services.py \
            app/settings.py \
            app/utils.py \
            tests/test_app.py \
            tests/test_hermes_reviewer.py

      - name: Run tests
        run: pytest -q
